name: Report a bug
description: Tell us about a bug or issue.
title: 'Bug: '
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Prerequisites
      description: Please confirm the following before submitting.
      options:
        - label: I have searched for duplicate or closed issues
          required: true
        - label: I have read the contributing guidelines
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: Describe the issue
      description:
        Provide a summary of the issue and what you expected to happen,
        including specific steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: reduced-test-case
    attributes:
      label: Reproduction
      description:
        Provide a minimal reproduction or the smallest set of steps needed to
        reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 'e.g., 0.1.0'
