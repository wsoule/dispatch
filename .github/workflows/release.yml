name: Release

# Builds distributable desktop bundles on every `v*` tag and attaches them to
# a GitHub Release. Each matrix job builds for its runner's host platform —
# no cross-compilation, so the `bun build --compile` sidecars (which target
# the host by default) always match the app binary's architecture:
#   - macos-latest       -> aarch64 .dmg (Apple Silicon)
#   - macos-15-intel     -> x64 .dmg (Intel Macs)
#   - ubuntu-latest      -> x64 .deb / .rpm / .AppImage
# Windows is intentionally absent: the bundled sidecar resources are declared
# without `.exe` extensions in tauri.conf.json and dispatchd's packaged-app
# spawn path is not wired for Windows yet (see apps/desktop/src-tauri/src/
# sidecar.rs "Phase 6 TODO").

on:
  push:
    tags:
      - 'v*'
  # Manual runs exist to (re-)publish the Homebrew cask for an
  # already-released tag — only the update-homebrew-tap job runs (the
  # create-release/build jobs are push-gated below), so this never rebuilds
  # or re-uploads assets.
  workflow_dispatch:
    inputs:
      tag:
        description:
          'Existing release tag (e.g. v0.2.1) to publish to the Homebrew tap'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # A single up-front create avoids the three build jobs racing to create
      # the same release. Builds then only upload assets into it.
      - name: Create GitHub release for the tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            || gh release create "$GITHUB_REF_NAME" \
                 --repo "$GITHUB_REPOSITORY" \
                 --verify-tag \
                 --generate-notes \
                 --title "$GITHUB_REF_NAME"

  build:
    name: Build (${{ matrix.os }})
    if: github.event_name == 'push'
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundles: src-tauri/target/release/bundle/dmg/*.dmg
          - os: macos-15-intel
            bundles: src-tauri/target/release/bundle/dmg/*.dmg
          - os: ubuntu-latest
            bundles: >-
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Bun and install dependencies
        uses: ./.github/actions/setup

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable (2026-07-16)
        with:
          toolchain: stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux webkit/bundling dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      # Workspace package dist/ output must exist before the desktop build:
      # the sidecar `bun build --compile` step resolves @dispatch/* imports
      # through each package.json's `exports`, which point at dist/*.
      - name: Build workspace packages
        run: bun run build

      # The signing certificate must be importable BEFORE the build: the
      # sidecar build script codesigns during tauri's beforeBuildCommand,
      # which runs earlier than tauri's own APPLE_CERTIFICATE temp-keychain
      # import — signing there found no identity (the v0.1.1 first-run
      # failure). Import into a dedicated default keychain up front so both
      # the sidecar script and tauri's bundler resolve the identity. No-op
      # (leaving the build unsigned) when the certificate secret is absent.
      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE secret not set — building unsigned"
            exit 0
          fi
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain > /dev/null
          rm certificate.p12
          security find-identity -v -p codesigning build.keychain

      # macOS signing + notarization. APPLE_SIGNING_IDENTITY makes both the
      # sidecar build script (apps/desktop/scripts/build-sidecars.ts) and
      # tauri's bundler sign against the keychain imported above;
      # APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID trigger notarization of the
      # DMG. APPLE_CERTIFICATE is deliberately NOT passed here — the import
      # step above already owns keychain setup. The unset loop strips empty
      # values (unset repo secrets arrive as empty strings) so a fork or a
      # repo without signing secrets still produces unsigned builds instead
      # of failing on a bogus empty identity.
      - name: Build desktop bundles
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for var in APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "$(printenv "$var")" ]; then unset "$var"; fi
          done
          bun ws desktop tauri build

      - name: Upload bundles to the release
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            ${{ matrix.bundles }}

  # Publishes the release to the Homebrew tap: downloads the two DMGs the
  # build jobs uploaded, computes their sha256s, and pushes a version+hash
  # bump to wsoule/homebrew-tap's Casks/dispatch.rb. Authenticates with the
  # TAP_DEPLOY_KEY secret (a write deploy key on the tap repo). Runs after a
  # tag build, or standalone via workflow_dispatch for an existing tag —
  # `!cancelled()` lets it run when build was skipped (dispatch) but still
  # requires build success on tag pushes. Idempotent: an already-current cask
  # exits without committing.
  update-homebrew-tap:
    name: Update Homebrew cask
    needs: build
    if:
      ${{ !cancelled() && (github.event_name == 'workflow_dispatch' ||
      needs.build.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      # inputs.tag is user-typed: it reaches the shell only via env (never
      # inline ${{ }} in run:) and is format-validated before any use.
      - name: Resolve and validate the release tag
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag '$TAG' does not look like vX.Y.Z" >&2
            exit 1
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Download release DMGs and compute checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.dmg'
          ARM_SHA=$(sha256sum "Dispatch_${VERSION}_aarch64.dmg" | cut -d' ' -f1)
          X64_SHA=$(sha256sum "Dispatch_${VERSION}_x64.dmg" | cut -d' ' -f1)
          echo "ARM_SHA=$ARM_SHA" >> "$GITHUB_ENV"
          echo "X64_SHA=$X64_SHA" >> "$GITHUB_ENV"

      - name: Push cask bump to the tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/tap_deploy_key -o StrictHostKeyChecking=accept-new'
          git clone --depth 1 git@github.com:wsoule/homebrew-tap.git tap
          cd tap
          sed -i -E "s|^  version \"[^\"]*\"|  version \"${VERSION}\"|" Casks/dispatch.rb
          sed -i -E "s|^  sha256 arm:   \"[0-9a-f]*\",|  sha256 arm:   \"${ARM_SHA}\",|" Casks/dispatch.rb
          sed -i -E "s|^         intel: \"[0-9a-f]*\"|         intel: \"${X64_SHA}\"|" Casks/dispatch.rb
          if git diff --quiet; then
            echo "cask already at ${VERSION} — nothing to push"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "dispatch ${VERSION}"
          git push origin HEAD:main
