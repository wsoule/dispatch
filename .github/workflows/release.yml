name: Release

# Builds distributable desktop bundles on every `v*` tag and attaches them to
# a GitHub Release. Each matrix job builds for its runner's host platform —
# no cross-compilation, so the `bun build --compile` sidecars (which target
# the host by default) always match the app binary's architecture:
#   - macos-latest       -> aarch64 .dmg (Apple Silicon)
#   - macos-15-intel     -> x64 .dmg (Intel Macs)
#   - ubuntu-latest      -> x64 .deb / .rpm / .AppImage
# Windows is intentionally absent: the bundled sidecar resources are declared
# without `.exe` extensions in tauri.conf.json and dispatchd's packaged-app
# spawn path is not wired for Windows yet (see apps/desktop/src-tauri/src/
# sidecar.rs "Phase 6 TODO").

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # A single up-front create avoids the three build jobs racing to create
      # the same release. Builds then only upload assets into it.
      - name: Create GitHub release for the tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            || gh release create "$GITHUB_REF_NAME" \
                 --repo "$GITHUB_REPOSITORY" \
                 --verify-tag \
                 --generate-notes \
                 --title "$GITHUB_REF_NAME"

  build:
    name: Build (${{ matrix.os }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundles: src-tauri/target/release/bundle/dmg/*.dmg
          - os: macos-15-intel
            bundles: src-tauri/target/release/bundle/dmg/*.dmg
          - os: ubuntu-latest
            bundles: >-
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Bun and install dependencies
        uses: ./.github/actions/setup

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable (2026-07-16)
        with:
          toolchain: stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux webkit/bundling dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      # Workspace package dist/ output must exist before the desktop build:
      # the sidecar `bun build --compile` step resolves @dispatch/* imports
      # through each package.json's `exports`, which point at dist/*.
      - name: Build workspace packages
        run: bun run build

      # macOS signing + notarization. Tauri's CLI reads these env vars
      # directly: APPLE_CERTIFICATE (base64 .p12) is imported into a
      # temporary keychain, APPLE_SIGNING_IDENTITY signs the bundle (and the
      # sidecar build script signs the resource binaries — see
      # apps/desktop/scripts/build-sidecars.ts), and APPLE_ID/APPLE_PASSWORD/
      # APPLE_TEAM_ID trigger notarization of the DMG. The unset loop strips
      # empty values (unset repo secrets arrive as empty strings) so a fork
      # or a repo without signing secrets still produces unsigned builds
      # instead of failing on a bogus empty identity.
      - name: Build desktop bundles
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for var in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "$(printenv "$var")" ]; then unset "$var"; fi
          done
          bun ws desktop tauri build

      - name: Upload bundles to the release
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            ${{ matrix.bundles }}
