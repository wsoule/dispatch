<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="200" y1="140" x2="824" y2="884" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6b74e6"/>
      <stop offset="1" stop-color="#4a54c4"/>
    </linearGradient>
    <radialGradient id="node" cx="0.35" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe3ff"/>
    </radialGradient>
  </defs>

  <!-- App-icon rounded square (macOS grid: artwork inset with transparent margin) -->
  <rect x="128" y="128" width="768" height="768" rx="176" fill="url(#bg)"/>

  <!-- Orbit + hub + agent: the center orchestrator, one tilted orbit ring, one agent node on it -->
  <g transform="rotate(-20 512 512)">
    <ellipse cx="512" cy="512" rx="286" ry="150" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="26"/>
    <ellipse cx="512" cy="512" rx="180" ry="94" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="18"/>
  </g>

  <!-- Center hub -->
  <circle cx="512" cy="512" r="66" fill="#ffffff"/>

  <!-- Agent node riding the outer orbit (upper-right), with a soft halo -->
  <circle cx="675" cy="340" r="86" fill="#ffffff" fill-opacity="0.16"/>
  <circle cx="675" cy="340" r="52" fill="url(#node)"/>
</svg>
